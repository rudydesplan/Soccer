# apt's nginx package logs to /var/log/nginx/*.log by default, which Cloud
# Logging never sees. Redirect to stdout/stderr so `gcloud run services logs`
# actually shows something when this breaks during a demo.
error_log  /dev/stderr warn;
access_log /dev/stdout;

server {
    listen 8080;

    # Serve built React static files
    root /app/static;
    index index.html;

    # Proxy all /api/* requests to uvicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # FastAPI interactive docs. Swagger UI at /docs fetches /openapi.json,
    # so all three must be proxied for the docs to work in production.
    location = /docs {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /redoc {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /openapi.json {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — unknown routes serve index.html (React Router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
